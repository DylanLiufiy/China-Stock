name: China Stock Auto Monitor

on:
  schedule:
    # ⏱️ 完美卡在 A 股早盘盘中（10:30）和尾盘定调（14:45）进行全市场洗劫（北京时间 = UTC + 8）
    - cron: '30 2 * * 1-5'   # 对应北京时间 早上 10:30
    - cron: '45 6 * * 1-5'   # 对应北京时间 下午 14:45
  workflow_dispatch: # 允许网页上随时点击按钮测试

jobs:
  china-quant-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute China Stock Radar
      env:
        # 🔒 从当前新仓库的保险箱中安全读取密钥
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: python china_stock_monitor.py
